<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{.Title}} · MapexOS docs</title>
<meta name="description" content="{{.Description}}" />
<link rel="icon" type="image/png" href="/assets/only-logo.png" />
<style>
  :root {
    --bg: #131c26; --bg-deep: #0e161e; --surface: #1b2530; --surface-2: #222e3a; --sunken: #151e27;
    --border: rgba(255,255,255,0.08); --border-2: rgba(255,255,255,0.16);
    --text: #e6edf3; --muted: #a7b4c2; --faint: #738191;
    --green: #4caf7d; --green-br: #5bc08d; --teal: #26a69a; --mint: #7fe0b0;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SFMono-Regular", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    --maxw: 1320px;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.65; -webkit-font-smoothing: antialiased; }
  a { color: var(--green-br); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* top bar */
  header.top { position: sticky; top: 0; z-index: 60; height: 64px; display: flex; align-items: center; gap: 18px; padding: 0 24px; backdrop-filter: blur(16px); background: rgba(19,28,38,0.82); border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 750; font-size: 16px; color: var(--text); }
  .brand img { width: 30px; height: 30px; border-radius: 8px; }
  .brand .tag { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); border: 1px solid var(--border); border-radius: 999px; padding: 3px 9px; margin-left: 4px; }
  header.top nav { margin-left: auto; display: flex; gap: 20px; align-items: center; }
  header.top nav a { color: var(--muted); font-size: 14px; font-weight: 500; }
  header.top nav a:hover { color: var(--text); text-decoration: none; }
  .menu-btn { display: none; background: none; border: 1px solid var(--border-2); color: var(--text); border-radius: 8px; padding: 7px 10px; cursor: pointer; }

  .shell { max-width: var(--maxw); margin: 0 auto; display: grid; grid-template-columns: 264px minmax(0,1fr) 224px; gap: 40px; padding: 0 24px; }
  @media (max-width: 1100px) { .shell { grid-template-columns: 264px minmax(0,1fr); } .toc { display: none; } }
  @media (max-width: 820px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { position: fixed; inset: 64px auto 0 0; width: 280px; background: var(--bg-deep); border-right: 1px solid var(--border); transform: translateX(-100%); transition: transform .2s; z-index: 55; overflow-y: auto; padding: 20px; }
    .sidebar.open { transform: none; }
    .menu-btn { display: inline-flex; }
  }

  /* sidebar */
  .sidebar { align-self: start; position: sticky; top: 64px; max-height: calc(100vh - 64px); overflow-y: auto; padding: 28px 8px 40px 0; }
  .sidebar .sec { margin-bottom: 22px; }
  .sidebar .sec > .sec-t { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); margin: 0 0 10px; padding-left: 12px; }
  .sidebar a.pg { display: block; font-size: 14px; color: var(--muted); padding: 6px 12px; border-radius: 8px; border-left: 2px solid transparent; }
  .sidebar a.pg:hover { color: var(--text); background: rgba(255,255,255,0.03); text-decoration: none; }
  .sidebar a.pg.active { color: var(--green-br); background: rgba(76,175,125,0.10); border-left-color: var(--green-br); font-weight: 600; }

  /* content */
  .content { min-width: 0; padding: 40px 0 80px; }
  .crumb { font-family: var(--mono); font-size: 12px; color: var(--faint); margin-bottom: 14px; letter-spacing: .03em; }
  .doc h1 { font-size: clamp(30px, 4vw, 40px); font-weight: 820; letter-spacing: -0.02em; margin: 0 0 8px; }
  .doc h2 { font-size: 25px; font-weight: 750; letter-spacing: -0.015em; margin: 44px 0 14px; padding-top: 8px; border-top: 1px solid var(--border); }
  .doc h3 { font-size: 19px; font-weight: 700; margin: 30px 0 10px; }
  .doc h4 { font-size: 16px; font-weight: 700; margin: 24px 0 8px; color: var(--muted); }
  .doc p, .doc li { color: var(--muted); font-size: 15.5px; }
  .doc strong { color: var(--text); }
  .doc a { color: var(--green-br); }
  .doc ul, .doc ol { padding-left: 22px; }
  .doc li { margin: 6px 0; }
  .doc code { font-family: var(--mono); font-size: 0.88em; background: rgba(255,255,255,0.07); border: 1px solid var(--border); padding: 1px 6px; border-radius: 5px; color: #cfe6da; }
  .doc pre { background: var(--sunken); border: 1px solid var(--border-2); border-radius: 12px; padding: 18px 18px; overflow-x: auto; margin: 18px 0; }
  .doc pre code { background: none; border: 0; padding: 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
  .doc blockquote { margin: 18px 0; padding: 4px 18px; border-left: 3px solid var(--green); background: rgba(76,175,125,0.06); border-radius: 0 10px 10px 0; color: var(--text); }
  .doc blockquote p { color: var(--text); }
  .doc table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; display: block; overflow-x: auto; }
  .doc th, .doc td { text-align: left; padding: 10px 14px; border: 1px solid var(--border); }
  .doc th { background: rgba(255,255,255,0.03); color: var(--text); font-weight: 700; }
  .doc td { color: var(--muted); }
  .doc img { max-width: 100%; border: 1px solid var(--border); border-radius: 10px; }
  .doc hr { border: 0; border-top: 1px solid var(--border); margin: 32px 0; }
  .doc h2 a.anchor, .doc h3 a.anchor { opacity: 0; margin-left: 8px; color: var(--faint); font-weight: 400; }
  .doc h2:hover a.anchor, .doc h3:hover a.anchor { opacity: 1; }

  /* prev/next */
  .pager { display: flex; gap: 16px; margin-top: 56px; }
  .pager a { flex: 1; border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; color: var(--text); transition: border-color .2s, background .2s; }
  .pager a:hover { border-color: var(--green); background: rgba(76,175,125,0.05); text-decoration: none; }
  .pager .dir { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }
  .pager .ttl { font-weight: 650; margin-top: 4px; }
  .pager a.next { text-align: right; }

  /* toc */
  .toc { align-self: start; position: sticky; top: 64px; max-height: calc(100vh - 64px); overflow-y: auto; padding: 44px 0 40px; }
  .toc .toc-t { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); margin: 0 0 12px; }
  .toc a { display: block; font-size: 13px; color: var(--faint); padding: 4px 0 4px 12px; border-left: 2px solid var(--border); }
  .toc a:hover { color: var(--text); text-decoration: none; }
  .toc a.h3 { padding-left: 24px; }
  .toc a.active { color: var(--green-br); border-left-color: var(--green-br); }
  .scrim { display: none; }
  .scrim.show { display: block; position: fixed; inset: 64px 0 0 0; background: rgba(0,0,0,.5); z-index: 54; }
</style>
</head>
<body>
<header class="top">
  <a class="brand" href="/"><img src="/assets/only-logo.png" alt="MapexOS" /> MapexOS <span class="tag">docs</span></a>
  <nav>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    <a href="/">Home</a>
    <a href="/#action">Platform</a>
    <a href="https://github.com/Mapex-Solutions" target="_blank" rel="noopener">GitHub ↗</a>
  </nav>
</header>

<div class="scrim" id="scrim"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar">{{.Sidebar}}</aside>
  <main class="content">
    <div class="crumb">{{.Crumb}}</div>
    <article class="doc" id="doc">{{.Content}}</article>
    <nav class="pager">
      {{if .PrevHref}}<a class="prev" href="{{.PrevHref}}"><div class="dir">← Previous</div><div class="ttl">{{.PrevTitle}}</div></a>{{else}}<span style="flex:1"></span>{{end}}
      {{if .NextHref}}<a class="next" href="{{.NextHref}}"><div class="dir">Next →</div><div class="ttl">{{.NextTitle}}</div></a>{{else}}<span style="flex:1"></span>{{end}}
    </nav>
  </main>
  <aside class="toc"><div class="toc-t">On this page</div><nav id="toc"></nav></aside>
</div>

<script>
(function () {
  "use strict";
  // mobile sidebar
  var sb = document.getElementById("sidebar"), btn = document.getElementById("menuBtn"), scrim = document.getElementById("scrim");
  function toggle(open) { sb.classList.toggle("open", open); scrim.classList.toggle("show", open); }
  if (btn) btn.addEventListener("click", function () { toggle(!sb.classList.contains("open")); });
  if (scrim) scrim.addEventListener("click", function () { toggle(false); });

  // build TOC from headings, with anchors
  var doc = document.getElementById("doc"), tocEl = document.getElementById("toc");
  var heads = doc ? doc.querySelectorAll("h2, h3") : [];
  var links = [];
  function slug(t) { return t.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, ""); }
  Array.prototype.forEach.call(heads, function (h) {
    if (!h.id) h.id = slug(h.textContent);
    var a = document.createElement("a");
    a.href = "#" + h.id; a.textContent = h.textContent; a.className = h.tagName === "H3" ? "h3" : "h2";
    tocEl.appendChild(a); links.push({ a: a, h: h });
    var anc = document.createElement("a"); anc.href = "#" + h.id; anc.className = "anchor"; anc.textContent = "#"; anc.setAttribute("aria-hidden", "true");
    h.appendChild(anc);
  });
  // scroll spy
  if ("IntersectionObserver" in window && links.length) {
    var io = new IntersectionObserver(function (es) {
      es.forEach(function (en) {
        if (en.isIntersecting) {
          links.forEach(function (l) { l.a.classList.toggle("active", l.h === en.target); });
        }
      });
    }, { rootMargin: "-64px 0px -70% 0px" });
    links.forEach(function (l) { io.observe(l.h); });
  }
})();
</script>
</body>
</html>
